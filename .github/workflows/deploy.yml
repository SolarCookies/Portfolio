name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Or your default branch name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # Action to check out your code

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x' # Use a specific Node.js version

    - name: Install dependencies
      run: npm ci # Use npm ci for CI/CD for speed and reliability

    - name: Configure Git identity
      run: |
        git config --global user.email "mag1182@rocketmail.com"
        git config --global user.name "SolarCookies"

    - name: Run deploy script
      run: npm run deploy
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Use the built-in GitHub token for authentication 
        # or a custom secret if required by your deploy script, e.g., ${{ secrets.ACTIONS_DEPLOY_ACCESS_TOKEN }}